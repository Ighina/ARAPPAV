# Verifier model configuration

verifier:
  model_name_or_path: "Qwen/Qwen2.5-7B-Instruct"
  use_peft: true
  lora:
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  generation:
    max_new_tokens: 2048
    temperature: 0.6
    top_p: 0.95
    do_sample: true
    repetition_penalty: 1.05       # discourages the repeated-JSON-block collapse
    n_completions: 3               # sample multiple responses for DPO pair construction
  prompt_template: "verifier_default"
