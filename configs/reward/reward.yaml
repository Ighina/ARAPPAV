# Reward function configuration

reward:
  # --- Error count requirement ---
  k_fixed: null                       # if set, exact k required; if null, sampled from k_range
  k_range: [2, 6]                     # [min, max] inclusive for per-episode sampling

  # --- Format penalty ---
  format_penalty: -10.0               # unparseable JSON (worst failure)
  format_penalty_soft: -5.0           # JSON parses but fails schema checks — graded so
                                      # all-failure GRPO groups still carry a reward gradient
  format_penalty_dominates: true      # ensures format penalty exceeds any possible task reward

  # --- Verifier reward ---
  precision_recall_beta: 1.0          # F-beta; 1.0 = F1, 0.5 = weight precision less, 2.0 = weight recall more
  verifier_reward_formula: "f_beta"   # "f_beta" | "recall_only" | "custom"

  # --- Perturber reward ---
  perturber_reward_formula: "one_minus_recall"  # "one_minus_recall" | "shaped" (TODO)
  # shaped_reward config (stretch goal — not active when formula == "one_minus_recall")
  shaped:
    obviousness_penalty_weight: 0.0
    near_miss_bonus_weight: 0.0

  # --- Matching ---
  span_overlap_threshold: 0.5         # IoU threshold for claim↔ground-truth matching
  use_semantic_match: false           # if true, use LLM judge for fuzzy semantic matching
  semantic_match_model: null          # model to use for semantic matching (null = same as verifier)

  # --- Error units (anti-stacking) ---
  # Collapse causally-linked errors (root + propagated boxed answer, overlapping
  # rewrites, near-duplicates) into one unit before computing recall, so the
  # Perturber can't cap recall at 1/k by declaring one mistake k times.
  error_units:
    enabled: true
    near_duplicate_threshold: 0.6     # token-Jaccard above which two errors merge
    merge_overlapping_spans: true     # merge errors occupying overlapping text regions
    merge_propagated_boxed: true      # merge changed-\boxed{} errors into the nearest upstream error
    merge_shared_change_fragment: true  # merge errors whose diffs introduce the same text (propagated term)

  # --- Degenerate-strategy guards ---
  anti_duplicate:
    enabled: true
    similarity_threshold: 0.85        # embedding cosine-sim threshold for near-duplicate detection
    penalty: -5.0                     # applied per detected duplicate (vs. previous rounds)
    intra_episode_enabled: true       # also check the current episode's errors against each other
    intra_episode_penalty: -1.0       # per near-verbatim duplicate within one episode
  anti_spam:
    enabled: true
    max_claims_ratio: 3.0             # penalize if verifier claims > ratio * k_effective errors (floored at 1)
    penalty_per_excess: -0.5
  anti_phantom:
    enabled: true
    max_phantom_ratio: 0.0            # fraction of errors allowed to be phantom (injected == original)
    penalty: -10.0                    # applied once if the phantom ratio is exceeded
  anti_repetition:
    enabled: true
    max_json_blocks: 5                # verifier outputs with more JSON blocks are considered collapsed
    penalty: -0.5                     # mild: perfect-but-repetitive should still beat a total miss
  anti_missing:
    enabled: true
    penalty_per_missing: -0.5         # per error declared by P but not present in the perturbed text
