# GRPO training configuration for Perturber

grpo:
  learning_rate: 5.0e-6
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  beta: 0.04                         # KL penalty coefficient
  epsilon: 0.2                       # clipping epsilon
  use_vllm_for_rollouts: true        # use vLLM during GRPO rollout generation
  num_generations: 8                 # G: group samples per input (matches group_size_G)
  temperature: 0.9
  missing_eos_penalty: 1.0           # penalty for truncated outputs
  max_prompt_length: 4096
